<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LumeDent – Anmelden</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://js.stripe.com/v3/"></script>
<style>
:root {
  --navy: #08111F; --navy-mid: #0F1E35; --navy-card: #112033;
  --gold: #C9A84C; --gold-light: #E4C46A;
  --white: #FFFFFF; --muted: #6E849E; --border-w: rgba(255,255,255,0.08);
  --green: #3DB87A; --red: #E05252;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--navy); color: var(--white); min-height: 100vh; display: flex; flex-direction: column; }

/* NAV */
nav { padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border-w); }
.logo { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 900; color: var(--white); text-decoration: none; display: flex; align-items: center; gap: 10px; }
.logo-mark { width: 30px; height: 30px; background: var(--gold); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.logo em { color: var(--gold); font-style: normal; }
.nav-link { color: var(--muted); text-decoration: none; font-size: 14px; }
.nav-link:hover { color: var(--white); }

/* MAIN */
main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
.card {
  background: var(--navy-card); border: 1px solid var(--border-w);
  border-radius: 18px; padding: 48px 44px; width: 100%; max-width: 440px;
  box-shadow: 0 40px 100px rgba(0,0,0,0.5);
}
.card-title { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 900; margin-bottom: 6px; }
.card-sub { font-size: 14px; color: var(--muted); margin-bottom: 32px; }

/* TABS */
.tabs { display: flex; gap: 4px; background: var(--navy); border-radius: 8px; padding: 4px; margin-bottom: 28px; }
.tab-btn { flex: 1; padding: 9px; border-radius: 6px; font-size: 14px; font-weight: 600; text-align: center; cursor: pointer; color: var(--muted); border: none; background: none; transition: all .2s; }
.tab-btn.active { background: var(--gold); color: var(--navy); }

/* FORM */
.form-group { margin-bottom: 18px; }
label { display: block; font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 7px; letter-spacing: 0.04em; text-transform: uppercase; }
input {
  width: 100%; padding: 13px 16px;
  background: var(--navy); border: 1px solid var(--border-w);
  border-radius: 8px; color: var(--white); font-size: 15px; font-family: 'DM Sans', sans-serif;
  outline: none; transition: border-color .2s;
}
input:focus { border-color: var(--gold); }
input::placeholder { color: var(--muted); }

/* Plan Auswahl */
.plan-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 18px; }
.plan-opt {
  border: 2px solid var(--border-w); border-radius: 10px; padding: 12px 8px;
  text-align: center; cursor: pointer; transition: all .2s;
}
.plan-opt:hover { border-color: rgba(201,168,76,0.4); }
.plan-opt.selected { border-color: var(--gold); background: rgba(201,168,76,0.08); }
.plan-opt-name { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: 4px; }
.plan-opt-price { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 900; color: var(--white); }
.plan-opt-mo { font-size: 10px; color: var(--muted); }
.plan-opt.selected .plan-opt-name { color: var(--gold); }

.btn {
  width: 100%; padding: 14px; background: var(--gold); color: var(--navy);
  border: none; border-radius: 8px; font-size: 15px; font-weight: 700;
  cursor: pointer; transition: all .2s; font-family: 'DM Sans', sans-serif;
}
.btn:hover { background: var(--gold-light); transform: translateY(-1px); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn-ghost {
  background: transparent; color: var(--muted); border: 1px solid var(--border-w);
  width: 100%; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 500;
  cursor: pointer; margin-top: 10px; font-family: 'DM Sans', sans-serif; transition: all .2s;
}
.btn-ghost:hover { border-color: var(--gold); color: var(--gold); }

.msg { padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; display: none; }
.msg.error { background: rgba(224,82,82,0.12); border: 1px solid rgba(224,82,82,0.3); color: #F28080; display: block; }
.msg.success { background: rgba(61,184,122,0.12); border: 1px solid rgba(61,184,122,0.3); color: #6EE7A8; display: block; }

.divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
.divider-line { flex: 1; height: 1px; background: var(--border-w); }
.divider-text { font-size: 12px; color: var(--muted); }

.trial-note { text-align: center; font-size: 12px; color: var(--muted); margin-top: 16px; line-height: 1.6; }
.trial-note strong { color: var(--gold); }
</style>
</head>
<body>

<nav>
  <a href="/" class="logo"><div class="logo-mark">✦</div>Lume<em>Dent</em></a>
  <a href="/" class="nav-link">← Zur Startseite</a>
</nav>

<main>
  <div class="card">
    <div class="card-title" id="card-title">Willkommen</div>
    <div class="card-sub" id="card-sub">Melde dich an oder erstelle ein Konto</div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login', this)">Anmelden</button>
      <button class="tab-btn" onclick="switchTab('register', this)">Registrieren</button>
    </div>

    <div id="msg" class="msg"></div>

    <!-- LOGIN -->
    <div id="form-login">
      <div class="form-group">
        <label>E-Mail</label>
        <input type="email" id="login-email" placeholder="deine@praxis.de">
      </div>
      <div class="form-group">
        <label>Passwort</label>
        <input type="password" id="login-pw" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btn" onclick="doLogin()" id="btn-login">Anmelden</button>
      <button class="btn-ghost" onclick="doReset()">Passwort vergessen?</button>
    </div>

    <!-- REGISTER -->
    <div id="form-register" style="display:none">
      <div class="form-group">
        <label>E-Mail</label>
        <input type="email" id="reg-email" placeholder="deine@praxis.de">
      </div>
      <div class="form-group">
        <label>Passwort</label>
        <input type="password" id="reg-pw" placeholder="Mindestens 8 Zeichen">
      </div>
      <div class="form-group">
        <label>Paket wählen</label>
        <div class="plan-grid">
          <div class="plan-opt selected" onclick="selectPlan(this,'price_1TRex6Q9LTpaOTHCJ4aL2IBd','solo')">
            <div class="plan-opt-name">Solo</div>
            <div class="plan-opt-price">49€</div>
            <div class="plan-opt-mo">/Monat · 1 Nutzer</div>
          </div>
          <div class="plan-opt" onclick="selectPlan(this,'price_1TRex7Q9LTpaOTHCiGy2QGAC','praxis')">
            <div class="plan-opt-name">Praxis</div>
            <div class="plan-opt-price">79€</div>
            <div class="plan-opt-mo">/Monat · 3 Nutzer</div>
          </div>
          <div class="plan-opt" onclick="selectPlan(this,'price_1TRex7Q9LTpaOTHCQxuhBixX','team')">
            <div class="plan-opt-name">Team</div>
            <div class="plan-opt-price">149€</div>
            <div class="plan-opt-mo">/Monat · Unbegrenzt</div>
          </div>
        </div>
      </div>
      <button class="btn" onclick="doRegister()" id="btn-register">14 Tage kostenlos starten →</button>
      <div class="trial-note">
        <strong>14 Tage kostenlos</strong> · Danach ab 49 €/Monat<br>
        Zahlungsmittel wird nach Registrierung hinterlegt · Jederzeit kündbar
      </div>
    </div>
  </div>
</main>

<script>
// ═══════════════════════════════════════════════
// LUMEDENT AUTH — komplett neu
// ═══════════════════════════════════════════════

const SUPABASE_URL = 'https://tsweacifoxqpphvnwire.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzd2VhY2lmb3hxcHBodm53aXJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2ODU1NjAsImV4cCI6MjA5MTI2MTU2MH0.X81LpvGrhB_G8alB_iXus1wd28FZSTM0ZLR6GeGmKDc';
const STRIPE_PK = 'pk_live_51TK3SiQ9LTpaOTHCtLbp6lNiLns1qFOtUi7OZw6xdZhYeKjixIHPEen1kCie2qSxd4kgUjTB3u6HuMO0b1dTLfoSq009mxX2YD9';
const ADMINS = ['info@lumedent.de', 'nico.schillings1208@googlemail.com'];
const PLAN_LIMITS = { solo: 1, praxis: 3, team: Infinity };
const PLAN_PRICES = {
  solo:   { id: 'price_1TRex6Q9LTpaOTHCJ4aL2IBd', idx: 0 },
  praxis: { id: 'price_1TRex7Q9LTpaOTHCiGy2QGAC', idx: 1 },
  team:   { id: 'price_1TRex7Q9LTpaOTHCQxuhBixX', idx: 2 }
};

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);
let stripe = null;
function getStripe() { if (!stripe) stripe = Stripe(STRIPE_PK); return stripe; }

let selectedPriceId = PLAN_PRICES.solo.id;
let selectedPlan = 'solo';

// ── 1. URL-Parameter SOFORT auslesen (DOM ist bereits da) ──
const _params = new URLSearchParams(window.location.search);
const _urlTab  = _params.get('tab');
const _urlPlan = _params.get('plan');

if (_urlTab === 'register') {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-btn')[1].classList.add('active');
  document.getElementById('form-login').style.display = 'none';
  document.getElementById('form-register').style.display = 'block';
}

if (_urlPlan && PLAN_PRICES[_urlPlan]) {
  const { id, idx } = PLAN_PRICES[_urlPlan];
  document.querySelectorAll('.plan-opt').forEach(p => p.classList.remove('selected'));
  document.querySelectorAll('.plan-opt')[idx].classList.add('selected');
  selectedPriceId = id;
  selectedPlan = _urlPlan;
}

// ── 2. Session prüfen — nur weiterleiten wenn KEIN register-Tab ──
sb.auth.getSession().then(({ data: { session } }) => {
  if (session && _urlTab !== 'register') {
    window.location.href = '/app.html';
  }
});

// ── UI FUNCTIONS ──────────────────────────────────────────
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
  clearMsg();
}

function selectPlan(el, priceId, plan) {
  document.querySelectorAll('.plan-opt').forEach(p => p.classList.remove('selected'));
  el.classList.add('selected');
  selectedPriceId = priceId;
  selectedPlan = plan;
}

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = `msg ${type}`;
}
function clearMsg() {
  document.getElementById('msg').className = 'msg';
}

// ── SESSION CONCURRENCY ───────────────────────────────────
function genToken() {
  return (crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2) + Date.now());
}

async function registerSession(userId, plan) {
  const token = genToken();
  const limit = PLAN_LIMITS[plan] || 1;
  const cutoff = new Date(Date.now() - 4 * 60 * 1000).toISOString();

  const { data: sessions } = await sb
    .from('active_sessions')
    .select('id, created_at')
    .eq('user_id', userId)
    .gte('last_seen', cutoff)
    .order('created_at', { ascending: true });

  const active = sessions || [];
  if (active.length >= limit) {
    const ids = active.slice(0, active.length - limit + 1).map(s => s.id);
    await sb.from('active_sessions').delete().in('id', ids);
  }

  await sb.from('active_sessions').insert({
    user_id: userId,
    session_token: token,
    plan: plan,
    device_info: navigator.userAgent.slice(0, 120),
    last_seen: new Date().toISOString()
  });

  sessionStorage.setItem('ld_session_token', token);
  sessionStorage.setItem('ld_user_id', userId);
  sessionStorage.setItem('ld_plan', plan);
  return token;
}

async function getPlanForUser(userId) {
  const { data: { user } } = await sb.auth.getUser();
  if (user && ADMINS.includes(user.email)) return 'team';
  const { data: sub } = await sb.from('subscriptions').select('plan,status').eq('user_id', userId).single();
  if (sub && (sub.status === 'active' || sub.status === 'trialing')) return sub.plan || 'solo';
  return null;
}

// ── LOGIN ─────────────────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pw = document.getElementById('login-pw').value;
  if (!email || !pw) return showMsg('Bitte E-Mail und Passwort eingeben.', 'error');

  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = 'Anmelden...';

  const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
  if (error) {
    showMsg('E-Mail oder Passwort falsch.', 'error');
    btn.disabled = false; btn.textContent = 'Anmelden';
    return;
  }

  btn.textContent = 'Session wird geprüft...';
  const userId = data.user.id;

  if (ADMINS.includes(data.user.email)) {
    await registerSession(userId, 'team');
    window.location.href = '/app.html';
    return;
  }

  const plan = await getPlanForUser(userId);
  if (!plan) {
    showMsg('Kein aktives Abonnement. Bitte wähle ein Paket.', 'error');
    await sb.auth.signOut();
    btn.disabled = false; btn.textContent = 'Anmelden';
    return;
  }

  await registerSession(userId, plan);
  window.location.href = '/app.html';
}

// ── REGISTER ──────────────────────────────────────────────
async function doRegister() {
  const email = document.getElementById('reg-email').value.trim();
  const pw = document.getElementById('reg-pw').value;
  if (!email) return showMsg('Bitte E-Mail eingeben.', 'error');
  if (pw.length < 8) return showMsg('Passwort muss mindestens 8 Zeichen haben.', 'error');

  const btn = document.getElementById('btn-register');
  btn.disabled = true; btn.textContent = 'Konto wird erstellt...';

  const { data, error } = await sb.auth.signUp({ email, password: pw });
  if (error) {
    showMsg('Fehler: ' + error.message, 'error');
    btn.disabled = false; btn.textContent = '14 Tage kostenlos starten →';
    return;
  }

  btn.textContent = 'Weiterleitung zu Stripe...';

  try {
    const res = await fetch('/api/create-checkout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        priceId: selectedPriceId,
        plan: selectedPlan,
        userId: data.user.id,
        email: email
      })
    });
    const { url } = await res.json();
    if (url) {
      window.location.href = url;
    } else {
      throw new Error('Keine Checkout URL erhalten');
    }
  } catch(e) {
    showMsg('Stripe Fehler: ' + e.message, 'error');
    btn.disabled = false; btn.textContent = '14 Tage kostenlos starten →';
  }
}

// ── RESET ─────────────────────────────────────────────────
async function doReset() {
  const email = document.getElementById('login-email').value.trim();
  if (!email) return showMsg('Bitte zuerst E-Mail eingeben.', 'error');
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/auth.html'
  });
  if (error) showMsg('Fehler: ' + error.message, 'error');
  else showMsg('Passwort-Reset E-Mail wurde gesendet.', 'success');
}
</script>
</body>
</html>
